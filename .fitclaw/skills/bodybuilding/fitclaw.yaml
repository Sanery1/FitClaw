version: 1
data:
  user_profile: {}
  training_log: {type: array}
  training_plan:
    type: object
    schema:
      type: object
      required: [name, goal, days_per_week, days]
      properties:
        schema_version:
          type: integer
          minimum: 1
        name:
          type: string
          minLength: 1
        goal:
          type: string
          minLength: 1
        days_per_week:
          type: integer
          minimum: 1
          maximum: 7
        days:
          type: array
          minItems: 1
          items:
            type: object
            required: [name, exercises]
            properties:
              name:
                type: string
                minLength: 1
              exercises:
                type: array
                minItems: 1
                items:
                  type: object
                  required: [name, sets, reps, rest_seconds]
                  properties:
                    name:
                      type: string
                      minLength: 1
                    sets:
                      type: integer
                      minimum: 1
                    reps:
                      anyOf:
                        - type: string
                          minLength: 1
                        - type: number
                          minimum: 1
                    rest_seconds:
                      type: integer
                      minimum: 0
  body_metrics: {type: array}
  progression: {type: array}
  personal_records: {type: array}
knowledge:
  collections: [kinesiology]
permissions:
  network: false
  commands:
    allow:
      - executable: python
        args: [scripts/setup_db.py]
      - executable: python
        args: [scripts/query_exercises.py]
      - executable: python3
        args: [scripts/setup_db.py]
      - executable: python3
        args: [scripts/query_exercises.py]
