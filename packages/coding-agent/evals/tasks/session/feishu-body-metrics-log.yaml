id: feishu-body-metrics-log
suite: session
prompt: "记录今天晨起体重 72.4kg，腰围 82cm，体脂 18.5%。"
initialData:
  sport-data/bodybuilding/body_metrics.json:
    - date: "2026-07-08"
      weight_kg: 72.8
      waist_cm: 83
      body_fat_percent: 19
fauxResponses:
  - toolCalls:
      - name: data_bodybuilding_write
        args:
          namespace: body_metrics
          mode: append
          data:
            date: "2026-07-15"
            weight_kg: 72.4
            waist_cm: 82
            body_fat_percent: 18.5
  - text: "已记录今天的晨起数据：体重 72.4kg，腰围 82cm，体脂 18.5%。"
graders:
  - type: final_contains
    text: "72.4kg"
  - type: final_contains
    text: "82cm"
  - type: final_contains
    text: "18.5%"
  - type: tool_sequence
    tools:
      - data_bodybuilding_write
  - type: tool_args_match
    tool: data_bodybuilding_write
    args:
      namespace: body_metrics
      mode: append
      data:
        date: "2026-07-15"
        weight_kg: 72.4
        waist_cm: 82
        body_fat_percent: 18.5
  - type: json_path_equals
    file: sport-data/bodybuilding/body_metrics.json
    path: $[0].weight_kg
    equals: 72.8
  - type: json_path_equals
    file: sport-data/bodybuilding/body_metrics.json
    path: $[1].weight_kg
    equals: 72.4
  - type: json_path_equals
    file: sport-data/bodybuilding/body_metrics.json
    path: $[1].waist_cm
    equals: 82
  - type: json_path_equals
    file: sport-data/bodybuilding/body_metrics.json
    path: $[1].body_fat_percent
    equals: 18.5
  - type: max_tool_calls
    max: 1
  - type: max_turns
    max: 2
