id: feishu-progression-log
suite: session
prompt: "记录一下训练进步：卧推 60kg 5x5 已经连续两周稳定完成，下周加到 62.5kg。"
initialData:
  sport-data/bodybuilding/progression.json:
    - date: "2026-06-30"
      type: deload
      reason: accumulated fatigue
fauxResponses:
  - toolCalls:
      - name: data_bodybuilding_write
        args:
          namespace: progression
          mode: append
          data:
            date: "2026-07-15"
            type: load_increase
            exercise: bench press
            previous_weight_kg: 60
            target_weight_kg: 62.5
            reason: 60kg 5x5 completed for two consecutive weeks
  - text: "已记录卧推进阶：60kg 5x5 连续两周稳定完成，下周目标调整为 62.5kg。"
graders:
  - type: final_contains
    text: "62.5kg"
  - type: final_contains
    text: "连续两周"
  - type: tool_sequence
    tools:
      - data_bodybuilding_write
  - type: tool_args_match
    tool: data_bodybuilding_write
    args:
      namespace: progression
      mode: append
      data:
        date: "2026-07-15"
        type: load_increase
        exercise: bench press
        previous_weight_kg: 60
        target_weight_kg: 62.5
  - type: json_path_equals
    file: sport-data/bodybuilding/progression.json
    path: $[0].type
    equals: deload
  - type: json_path_equals
    file: sport-data/bodybuilding/progression.json
    path: $[1].type
    equals: load_increase
  - type: json_path_equals
    file: sport-data/bodybuilding/progression.json
    path: $[1].exercise
    equals: bench press
  - type: json_path_equals
    file: sport-data/bodybuilding/progression.json
    path: $[1].target_weight_kg
    equals: 62.5
  - type: max_tool_calls
    max: 1
  - type: max_turns
    max: 2
