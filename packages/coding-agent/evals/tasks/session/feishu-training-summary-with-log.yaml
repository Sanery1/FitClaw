id: feishu-training-summary-with-log
suite: session
prompt: "总结一下我最近的训练记录"
initialData:
  sport-data/bodybuilding/training_log.json:
    - date: "2026-06-12"
      exercise: squat
      weight_kg: 100
      sets: 3
      reps: 8
    - date: "2026-06-15"
      exercise: bench press
      weight_kg: 60
      sets: 5
      reps: 5
      rpe: 8
fauxResponses:
  - toolCalls:
      - name: data_bodybuilding_read
        args:
          namespace: training_log
  - text: |
      最近有 2 条训练记录：2026-06-12 squat 100kg 3x8；2026-06-15 bench press 60kg 5x5，RPE 8。当前只能基于这些已保存记录总结。
graders:
  - type: final_contains
    text: "2 条"
  - type: final_contains
    text: "squat"
  - type: final_contains
    text: "100kg"
  - type: final_contains
    text: "bench press"
  - type: final_contains
    text: "60kg"
  - type: tool_sequence
    tools:
      - data_bodybuilding_read
  - type: tool_args_match
    tool: data_bodybuilding_read
    args:
      namespace: training_log
  - type: tool_not_called
    tool: data_bodybuilding_write
  - type: max_tool_calls
    max: 1
  - type: max_turns
    max: 2
