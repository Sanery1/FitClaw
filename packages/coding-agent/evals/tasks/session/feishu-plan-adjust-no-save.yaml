id: feishu-plan-adjust-no-save
suite: session
prompt: "我明天腿有点累，把计划临时调轻一点，但先不要保存。"
initialData:
  sport-data/bodybuilding/training_plan.json:
    name: four-day hypertrophy split
    goal: hypertrophy
    days_per_week: 4
    days:
      - name: Day 1 Upper A
        exercises:
          - name: bench press
            sets: 4
            reps: 8
            rest_seconds: 120
      - name: Day 2 Lower A
        exercises:
          - name: squat
            sets: 4
            reps: 6
            rest_seconds: 150
          - name: romanian deadlift
            sets: 3
            reps: 8
            rest_seconds: 120
fauxResponses:
  - toolCalls:
      - name: data_bodybuilding_read
        args:
          namespace: training_plan
  - text: |
      根据当前 four-day hypertrophy split，明天可以临时把 Day 2 Lower A 调轻：squat 从 4 组降到 2-3 组，RPE 控制在 6-7，romanian deadlift 减少 1 组或改成轻重量技术练习。这个只是临时建议，不保存到当前计划。
graders:
  - type: final_contains
    text: "临时"
  - type: final_contains_any
    texts:
      - "不保存"
      - "不会保存"
      - "不写入"
  - type: final_contains_any
    texts:
      - "调轻"
      - "减少"
      - "降低"
  - type: tool_sequence
    tools:
      - data_bodybuilding_read
  - type: tool_args_match
    tool: data_bodybuilding_read
    args:
      namespace: training_plan
  - type: tool_not_called
    tool: data_bodybuilding_write
  - type: json_path_equals
    file: sport-data/bodybuilding/training_plan.json
    path: $.name
    equals: four-day hypertrophy split
  - type: json_path_equals
    file: sport-data/bodybuilding/training_plan.json
    path: $.days_per_week
    equals: 4
  - type: json_path_equals
    file: sport-data/bodybuilding/training_plan.json
    path: $.days[1].exercises[0].sets
    equals: 4
  - type: max_tool_calls
    max: 1
  - type: max_turns
    max: 2
