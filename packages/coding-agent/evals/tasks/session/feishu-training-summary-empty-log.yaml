id: feishu-training-summary-empty-log
suite: session
prompt: "总结一下我最近的训练记录"
fauxResponses:
  - toolCalls:
      - name: data_bodybuilding_read
        args:
          namespace: training_log
  - text: |
      我现在没有可用的已保存训练记录，所以不能总结近期训练趋势。你可以先记录一次训练，比如动作、重量、组数和次数，我再帮你做回顾。
graders:
  - type: final_contains_any
    texts:
      - "没有可用的已保存训练记录"
      - "没有训练记录"
      - "不能总结"
  - type: final_not_contains
    text: "卧推"
  - type: final_not_contains
    text: "深蹲"
  - type: final_not_contains
    text: "进步"
  - type: tool_sequence
    tools:
      - data_bodybuilding_read
  - type: tool_args_match
    tool: data_bodybuilding_read
    args:
      namespace: training_log
  - type: tool_not_called
    tool: data_bodybuilding_write
  - type: max_tool_calls
    max: 1
  - type: max_turns
    max: 2
