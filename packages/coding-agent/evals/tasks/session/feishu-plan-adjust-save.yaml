id: feishu-plan-adjust-save
suite: session
prompt: "把当前计划里的下肢日调轻一点，并保存成我的当前计划。"
initialData:
  sport-data/bodybuilding/training_plan.json:
    name: four-day hypertrophy split
    goal: hypertrophy
    days_per_week: 4
    days:
      - name: Day 1 Upper A
        exercises:
          - name: bench press
            sets: 4
            reps: 8
            rest_seconds: 120
      - name: Day 2 Lower A
        exercises:
          - name: squat
            sets: 4
            reps: 6
            rest_seconds: 150
          - name: romanian deadlift
            sets: 3
            reps: 8
            rest_seconds: 120
fauxResponses:
  - toolCalls:
      - name: data_bodybuilding_read
        args:
          namespace: training_plan
  - toolCalls:
      - name: data_bodybuilding_write
        args:
          namespace: training_plan
          mode: replace
          data:
            name: four-day hypertrophy split - lighter lower day
            goal: hypertrophy
            days_per_week: 4
            days:
              - name: Day 1 Upper A
                exercises:
                  - name: bench press
                    sets: 4
                    reps: 8
                    rest_seconds: 120
              - name: Day 2 Lower A
                exercises:
                  - name: squat
                    sets: 3
                    reps: 6
                    rest_seconds: 150
                  - name: romanian deadlift
                    sets: 2
                    reps: 8
                    rest_seconds: 120
  - text: "已保存：当前计划里的 Day 2 Lower A 已调轻，squat 减少到 3 组，romanian deadlift 减少到 2 组。"
graders:
  - type: final_contains
    text: "已保存"
  - type: final_contains_any
    texts:
      - "调轻"
      - "降低"
      - "减少"
  - type: tool_sequence
    tools:
      - data_bodybuilding_read
      - data_bodybuilding_write
  - type: tool_args_match
    tool: data_bodybuilding_read
    args:
      namespace: training_plan
  - type: tool_args_match
    tool: data_bodybuilding_write
    args:
      namespace: training_plan
      mode: replace
      data:
        name: four-day hypertrophy split - lighter lower day
        days_per_week: 4
  - type: json_path_equals
    file: sport-data/bodybuilding/training_plan.json
    path: $.name
    equals: four-day hypertrophy split - lighter lower day
  - type: json_path_equals
    file: sport-data/bodybuilding/training_plan.json
    path: $.days_per_week
    equals: 4
  - type: json_path_equals
    file: sport-data/bodybuilding/training_plan.json
    path: $.days[1].exercises[0].sets
    equals: 3
  - type: json_path_equals
    file: sport-data/bodybuilding/training_plan.json
    path: $.days[1].exercises[0].reps
    equals: 6
  - type: max_tool_calls
    max: 2
  - type: max_turns
    max: 3
