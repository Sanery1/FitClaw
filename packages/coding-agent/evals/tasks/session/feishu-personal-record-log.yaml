id: feishu-personal-record-log
suite: session
prompt: "记录一个 PR：今天深蹲 100kg 做了 5 次。"
initialData:
  sport-data/bodybuilding/training_log.json: []
  sport-data/bodybuilding/personal_records.json: []
fauxResponses:
  - toolCalls:
      - name: data_bodybuilding_write
        args:
          namespace: training_log
          mode: append
          data:
            date: "2026-06-17"
            exercise: squat
            weight_kg: 100
            reps: 5
            notes: personal record 5rm
  - toolCalls:
      - name: data_bodybuilding_write
        args:
          namespace: personal_records
          mode: append
          data:
            date: "2026-06-17"
            exercise: squat
            metric: 5rm
            value: 100
            unit: kg
  - text: "已记录：今天深蹲 100kg x 5，并同步保存为 5RM 个人记录。"
graders:
  - type: final_contains
    text: "100kg"
  - type: final_contains_any
    texts:
      - "PR"
      - "个人记录"
  - type: tool_sequence
    tools:
      - data_bodybuilding_write
      - data_bodybuilding_write
  - type: tool_args_match
    tool: data_bodybuilding_write
    args:
      namespace: training_log
      mode: append
      data:
        exercise: squat
        weight_kg: 100
        reps: 5
  - type: tool_args_match
    tool: data_bodybuilding_write
    args:
      namespace: personal_records
      mode: append
      data:
        exercise: squat
        metric: 5rm
        value: 100
        unit: kg
  - type: json_path_equals
    file: sport-data/bodybuilding/training_log.json
    path: $[0].exercise
    equals: squat
  - type: json_path_equals
    file: sport-data/bodybuilding/training_log.json
    path: $[0].weight_kg
    equals: 100
  - type: json_path_equals
    file: sport-data/bodybuilding/personal_records.json
    path: $[0].exercise
    equals: squat
  - type: json_path_equals
    file: sport-data/bodybuilding/personal_records.json
    path: $[0].value
    equals: 100
  - type: max_tool_calls
    max: 2
  - type: max_turns
    max: 3
