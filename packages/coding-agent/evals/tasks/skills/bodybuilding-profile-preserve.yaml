id: bodybuilding-profile-preserve
suite: skills
prompt: "Add that I have a shoulder limitation to my training profile."
initialData:
  sport-data/bodybuilding/user_profile.json:
    goal: hypertrophy
    experience: intermediate
    equipment:
      - dumbbell
fauxResponses:
  - toolCalls:
      - name: data_bodybuilding_read
        args:
          namespace: user_profile
  - toolCalls:
      - name: data_bodybuilding_write
        args:
          namespace: user_profile
          mode: replace
          data:
            goal: hypertrophy
            experience: intermediate
            equipment:
              - dumbbell
            injury_limitations:
              - shoulder
  - text: I added your shoulder limitation and kept your existing hypertrophy profile.
graders:
  - type: final_contains
    text: shoulder
  - type: tool_sequence
    tools:
      - data_bodybuilding_read
      - data_bodybuilding_write
  - type: tool_args_match
    tool: data_bodybuilding_write
    args:
      namespace: user_profile
      mode: replace
      data:
        goal: hypertrophy
        experience: intermediate
        equipment:
          - dumbbell
        injury_limitations:
          - shoulder
  - type: json_path_equals
    file: sport-data/bodybuilding/user_profile.json
    path: $.goal
    equals: hypertrophy
  - type: json_path_equals
    file: sport-data/bodybuilding/user_profile.json
    path: $.experience
    equals: intermediate
  - type: json_path_equals
    file: sport-data/bodybuilding/user_profile.json
    path: $.equipment[0]
    equals: dumbbell
  - type: json_path_equals
    file: sport-data/bodybuilding/user_profile.json
    path: $.injury_limitations[0]
    equals: shoulder
  - type: max_tool_calls
    max: 2
  - type: max_turns
    max: 3
