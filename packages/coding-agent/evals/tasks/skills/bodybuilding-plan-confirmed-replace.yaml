id: bodybuilding-plan-confirmed-replace
suite: skills
prompt: "把这个三天增肌计划保存为我的当前训练计划。"
initialData:
  sport-data/bodybuilding/training_plan.json:
    name: old plan
    goal: general fitness
    days_per_week: 2
    days: []
fauxResponses:
  - toolCalls:
      - name: data_bodybuilding_write
        args:
          namespace: training_plan
          mode: replace
          data:
            name: 3-day hypertrophy plan
            goal: hypertrophy
            days_per_week: 3
            days:
              - name: Day 1 Upper
                exercises:
                  - name: bench press
                    sets: 4
                    reps: 8
                    rest_seconds: 120
              - name: Day 2 Lower
                exercises:
                  - name: squat
                    sets: 4
                    reps: 6
                    rest_seconds: 150
              - name: Day 3 Pull
                exercises:
                  - name: row
                    sets: 3
                    reps: 10
                    rest_seconds: 90
  - text: 已保存为你的当前三天增肌训练计划。
graders:
  - type: final_contains
    text: "已保存"
  - type: tool_sequence
    tools:
      - data_bodybuilding_write
  - type: tool_args_match
    tool: data_bodybuilding_write
    args:
      namespace: training_plan
      mode: replace
      data:
        name: 3-day hypertrophy plan
        goal: hypertrophy
        days_per_week: 3
  - type: json_path_equals
    file: sport-data/bodybuilding/training_plan.json
    path: $.name
    equals: 3-day hypertrophy plan
  - type: json_path_equals
    file: sport-data/bodybuilding/training_plan.json
    path: $.goal
    equals: hypertrophy
  - type: json_path_equals
    file: sport-data/bodybuilding/training_plan.json
    path: $.days_per_week
    equals: 3
  - type: json_path_equals
    file: sport-data/bodybuilding/training_plan.json
    path: $.days[0].exercises[0].rest_seconds
    equals: 120
  - type: max_tool_calls
    max: 1
  - type: max_turns
    max: 2
