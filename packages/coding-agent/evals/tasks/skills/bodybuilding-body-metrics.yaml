id: bodybuilding-body-metrics
suite: skills
prompt: "记录今天体重 72.4kg，腰围 82cm。"
initialData:
  sport-data/bodybuilding/body_metrics.json:
    - date: "2026-06-15"
      weight_kg: 72.8
fauxResponses:
  - toolCalls:
      - name: data_bodybuilding_write
        args:
          namespace: body_metrics
          mode: append
          data:
            date: "2026-06-16"
            weight_kg: 72.4
            waist_cm: 82
  - text: 已记录今天体重 72.4kg，腰围 82cm。
graders:
  - type: final_contains
    text: "72.4"
  - type: tool_sequence
    tools:
      - data_bodybuilding_write
  - type: tool_args_match
    tool: data_bodybuilding_write
    args:
      namespace: body_metrics
      mode: append
      data:
        date: "2026-06-16"
        weight_kg: 72.4
  - type: json_path_equals
    file: sport-data/bodybuilding/body_metrics.json
    path: $[0].weight_kg
    equals: 72.8
  - type: json_path_equals
    file: sport-data/bodybuilding/body_metrics.json
    path: $[1].weight_kg
    equals: 72.4
  - type: json_path_equals
    file: sport-data/bodybuilding/body_metrics.json
    path: $[1].waist_cm
    equals: 82
  - type: max_tool_calls
    max: 1
  - type: max_turns
    max: 2
