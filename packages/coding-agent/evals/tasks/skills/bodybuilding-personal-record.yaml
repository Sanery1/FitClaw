id: bodybuilding-personal-record
suite: skills
prompt: "记录一个 PR：今天深蹲 100kg 做了 5 次。"
initialData:
  sport-data/bodybuilding/personal_records.json:
    - date: "2026-05-20"
      exercise: bench press
      metric: 5rm
      value: 60
      unit: kg
fauxResponses:
  - toolCalls:
      - name: data_bodybuilding_write
        args:
          namespace: personal_records
          mode: append
          data:
            date: "2026-06-16"
            exercise: squat
            metric: 5rm
            value: 100
            unit: kg
  - text: 已记录深蹲 100kg x 5 的个人记录。
graders:
  - type: final_contains
    text: "100kg"
  - type: tool_sequence
    tools:
      - data_bodybuilding_write
  - type: tool_args_match
    tool: data_bodybuilding_write
    args:
      namespace: personal_records
      mode: append
      data:
        date: "2026-06-16"
        exercise: squat
        metric: 5rm
        value: 100
        unit: kg
  - type: json_path_equals
    file: sport-data/bodybuilding/personal_records.json
    path: $[0].exercise
    equals: bench press
  - type: json_path_equals
    file: sport-data/bodybuilding/personal_records.json
    path: $[1].exercise
    equals: squat
  - type: json_path_equals
    file: sport-data/bodybuilding/personal_records.json
    path: $[1].value
    equals: 100
  - type: max_tool_calls
    max: 1
  - type: max_turns
    max: 2
